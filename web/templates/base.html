<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteEngine — Bus Route Intelligence</title>
    <meta name="description" content="RouteEngine — Real-time Bus Route Intelligence Dashboard powered by C++ and Flask">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <!-- Theme Initializer (prevents flash) -->
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" id="navbar">
        <a href="/" class="navbar-brand">
            <div class="brand-icon">
                <i class="bi bi-bus-front-fill"></i>
            </div>
            <span class="brand-name">RouteEngine</span>
        </a>
        <div class="navbar-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}" id="nav-home">
                <i class="bi bi-grid-1x2-fill"></i> Dashboard
            </a>
            <a href="/data" class="{% if request.path == '/data' %}active{% endif %}" id="nav-data">
                <i class="bi bi-database-fill"></i> Data
            </a>
            <a href="/map" class="{% if request.path == '/map' %}active{% endif %}" id="nav-map">
                <i class="bi bi-pin-map-fill"></i> Map
            </a>
            <a href="/stats" class="{% if request.path == '/stats' %}active{% endif %}" id="nav-stats">
                <i class="bi bi-bar-chart-fill"></i> Analytics
            </a>
            
            <!-- Dark Mode Toggle -->
            <button id="theme-toggle" class="theme-toggle-btn" title="Toggle Dark/Light Mode">
                <i class="bi bi-bus-front-fill" id="theme-icon"></i>
            </button>
        </div>
    </nav>

    <!-- ===== MAIN ===== -->
    <div class="page-wrapper">
        <main class="page-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="site-footer">
        <div class="footer-left">
            <div class="footer-brand-icon">
                <i class="bi bi-bus-front-fill"></i>
            </div>
            <div class="footer-brand-text">
                <span class="footer-brand-name">RouteEngine</span>
                <span class="footer-tagline">Powered by C++ &amp; Flask</span>
            </div>
        </div>
        <div class="footer-right">
            OODP Mini Project &nbsp;|&nbsp; Section E1 &nbsp;|&nbsp; Dr. R. Deepa
        </div>
    </footer>

    <!-- ===== Navbar scroll shadow ===== -->
    <script>
        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 8);
        });

        // Theme Toggle Logic
        const themeBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        
        function updateIcon() {
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                themeIcon.style.color = 'var(--accent)';
                themeIcon.style.textShadow = '0 0 10px var(--accent)';
            } else {
                themeIcon.style.color = 'var(--text-secondary)';
                themeIcon.style.textShadow = 'none';
            }
        }
        
        // Initial setup
        updateIcon();
        
        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
            updateIcon();
            window.dispatchEvent(new Event('themeChanged'));
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
